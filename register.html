<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - NovaBank</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <span class="logo-mark">N</span>
                    <span class="logo-text">NovaBank</span>
                </div>
                <h2>Create your NovaBank account</h2>
                <p>Open a mini digital bank account in seconds.</p>
            </div>
            <form action="php/auth.php" method="POST" class="auth-form">
                <!-- Hidden action to route in auth.php -->
                <input type="hidden" name="action" value="register">

                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group-inline">
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="confirm_password">Confirm Password</label>
                        <input type="password" id="confirm_password" name="confirm_password" required minlength="6">
                    </div>
                </div>

                <div class="form-group">
                    <label for="initial_balance">Initial Balance (₹)</label>
                    <input type="number" id="initial_balance" name="initial_balance" min="0" step="0.01" required>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Create Account</button>
            </form>
            <p class="auth-footer-text">
                Already have an account?
                <a href="login.html">Login here</a>
            </p>
        </div>
    </div>
</body>
</html>
