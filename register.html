<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Mini Digital Banking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-body">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-circle small">
                    <i class="fa-solid fa-building-columns"></i>
                </div>
                <div>
                    <h2>Create Your Account</h2>
                    <p>Join Mini Digital Bank and start banking in minutes.</p>
                </div>
            </div>

            <form id="registerForm" class="auth-form">
                <div class="form-row">
                    <label for="fullName">Full Name</label>
                    <div class="input-icon">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="fullName" name="fullName" required placeholder="Enter your full name">
                    </div>
                </div>

                <div class="form-row">
                    <label for="email">Email</label>
                    <div class="input-icon">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="email" name="email" required placeholder="you@example.com">
                    </div>
                </div>

                <div class="form-row">
                    <label for="phone">Phone Number</label>
                    <div class="input-icon">
                        <i class="fa-solid fa-phone"></i>
                        <input type="tel" id="phone" name="phone" required placeholder="+91 98765 43210">
                    </div>
                </div>

                <div class="form-row two-col">
                    <div>
                        <label for="password">Password</label>
                        <div class="input-icon">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="password" name="password" required minlength="6" placeholder="Create a password">
                        </div>
                    </div>
                    <div>
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="input-icon">
                            <i class="fa-solid fa-lock-keyhole"></i>
                            <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6" placeholder="Repeat password">
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <label for="initialBalance">Initial Balance (₹)</label>
                    <div class="input-icon">
                        <i class="fa-solid fa-indian-rupee-sign"></i>
                        <input type="number" id="initialBalance" name="initialBalance" required min="0" step="0.01" value="0">
                    </div>
                </div>

                <div class="form-row checkbox-row">
                    <label>
                        <input type="checkbox" id="acceptTerms" required>
                        I agree to the <span class="link-like">Terms &amp; Conditions</span>.
                    </label>
                </div>

                <button type="submit" class="btn btn-primary full-width">
                    <i class="fa-regular fa-circle-check"></i> Create Account
                </button>

                <p class="auth-alt">
                    Already have an account?
                    <a href="login.html">Login</a>
                </p>

                <p class="auth-note">
                    This is a demo digital banking system. All data is stored locally in your browser.
                </p>
            </form>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
