<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Aurex</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

</head>
<body>

    <div class="auth-container">
        <div class="auth-card wide">
            <a href="index.html" style="position: absolute; top: 16px; right: 16px; font-size: 1.5rem; color: var(--text-light); transition: color 0.3s;" onmouseover="this.style.color='var(--danger)'" onmouseout="this.style.color='var(--text-light)'"><i class="fas fa-times"></i></a>
            <div class="auth-header">
                <a href="index.html" class="logo" style="display: flex; align-items: center; justify-content: center; text-decoration: none; gap: 8px;">
                    <img src="assets/ajhggc_logo.png" alt="Aurex Logo" class="custom-logo-img" style="height: 48px;">
                    <span class="brand-text" style="font-size: 1.8rem;">Aurex</span>
                </a>
                <h2>Create Your Account</h2>
                <p style="color:var(--text-light); margin-top:8px;">Join the future of banking today.</p>
            </div>

            <form id="registerForm" onsubmit="handleRegistration(event)">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group" style="margin-bottom:0;">
                        <label class="form-label" style="text-align:left;">Full Name</label>
                        <input type="text" id="regName" class="form-control" placeholder="John Doe" required>
                    </div>
                    
                    <div class="form-group" style="margin-bottom:0;">
                        <label class="form-label" style="text-align:left;">Email Address</label>
                        <input type="email" id="regEmail" class="form-control" placeholder="john@example.com" required>
                    </div>

                    <div class="form-group" style="margin-bottom:0;">
                        <label class="form-label" style="text-align:left;">Phone Number</label>
                        <input type="tel" id="regPhone" class="form-control" placeholder="10-digit mobile number" pattern="[0-9]{10}" title="Must be a 10-digit number" required maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    </div>

                    <div class="form-group" style="margin-bottom:0;">
                        <label class="form-label" style="text-align:left;">Date of Birth</label>
                        <input type="date" id="regDob" class="form-control" required>
                    </div>

                    <div class="form-group" style="margin-bottom:0;">
                        <label class="form-label" style="text-align:left;">Aadhaar Number</label>
                        <input type="text" id="regAadhaar" class="form-control" placeholder="12-digit Aadhaar" pattern="[0-9]{12}" title="Must be exactly 12 digits" required maxlength="12">
                    </div>

                    <div class="form-group" style="margin-bottom:0;">
                        <label class="form-label" style="text-align:left;">Gender</label>
                        <select id="regGender" class="form-control" required>
                            <option value="" disabled selected>Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group" style="margin-bottom:0; grid-column: 1 / -1;">
                        <label class="form-label" style="text-align:left;">Initial Balance (₹)</label>
                        <input type="number" id="regBalance" class="form-control" placeholder="1000" min="0" required>
                    </div>

                    <div class="form-group" style="margin-bottom:0; grid-column: 1 / -1;">
                        <label class="form-label" style="text-align:left;">Create 6-Digit MPIN</label>
                        <input type="password" id="regMpin" class="form-control" placeholder="Enter 6-digit MPIN" required 
                               pattern="[0-9]{6}" maxlength="6" inputmode="numeric" 
                               oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        <small style="color:var(--text-light); font-size:0.8rem;">Used for secure login</small>
                    </div>

                    <div class="form-group" style="margin-bottom:0; grid-column: 1 / -1;">
                        <h3 style="color:var(--text-main); font-size:1.1rem; margin-bottom:15px; border-bottom:1px solid var(--border-color); padding-bottom:10px;">Security Questions</h3>
                        <p style="color:var(--text-light); font-size:0.85rem; margin-bottom:15px;">Required for account recovery and MPIN reset.</p>
                    </div>

                    <div class="form-group" style="margin-bottom:0;">
                        <label class="form-label" style="text-align:left;">Security Question 1</label>
                        <select id="regQuestion1" class="form-control" required>
                            <option value="" disabled selected>Select Question 1</option>
                            <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                            <option value="In what city were you born?">In what city were you born?</option>
                            <option value="What was the name of your first school?">What was the name of your first school?</option>
                            <option value="What is your father's middle name?">What is your father's middle name?</option>
                            <option value="What was the name of your first boss?">What was the name of your first boss?</option>
                        </select>
                    </div>

                    <div class="form-group" style="margin-bottom:0;">
                        <label class="form-label" style="text-align:left;">Answer 1</label>
                        <input type="text" id="regAnswer1" class="form-control" placeholder="Your Answer" required>
                    </div>

                    <div class="form-group" style="margin-bottom:0;">
                        <label class="form-label" style="text-align:left;">Security Question 2</label>
                        <select id="regQuestion2" class="form-control" required>
                            <option value="" disabled selected>Select Question 2</option>
                            <option value="What was the name of your first pet?">What was the name of your first pet?</option>
                            <option value="What was the make of your first car?">What was the make of your first car?</option>
                            <option value="What was your favorite subject in school?">What was your favorite subject in school?</option>
                            <option value="What is your favorite movie of all time?">What is your favorite movie of all time?</option>
                            <option value="What is the name of your favorite childhood friend?">What is the name of your favorite childhood friend?</option>
                        </select>
                    </div>

                    <div class="form-group" style="margin-bottom:0;">
                        <label class="form-label" style="text-align:left;">Answer 2</label>
                        <input type="text" id="regAnswer2" class="form-control" placeholder="Your Answer" required>
                    </div>
                </div>

                <div id="regGlobalError" class="error-message" style="margin-bottom: 20px; margin-top: 20px; font-size:1rem; text-align:center;"></div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top: 20px;">Register Account</button>


            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>

    <!-- Script specifically for auth functions will be linked here -->
    <script src="js/auth.js"></script>
</body>
</html>
