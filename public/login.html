<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Aurex</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">

        <a href="index.html" style="position: absolute; top: 16px; right: 16px; font-size: 1.5rem; color: var(--text-light);">
            <i class="fas fa-times"></i>
        </a>

        <div class="auth-header">
            <a href="index.html" class="logo">
                <i class="fas fa-university icon-primary"></i>
                <img src="assets/ajhggc_logo.png" alt="Logo" class="custom-logo-img" style="height: 48px; margin: 0 auto;">
            </a>


            <h2>Secure Login</h2>
            <p style="color:var(--text-light); margin-top:8px;">
                Access your digital banking dashboard.
            </p>
        </div>

        <!-- LOGIN FORM -->
        <form id="loginForm" onsubmit="handleFinalLogin(event)">
            <div id="loginError" class="error-message"></div>
            <div id="loginSuccess" class="success-message"></div>

            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="Enter email address" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password" required>

                <div style="text-align: right; margin-top: 8px;">
                    <a href="forgot-password.html" style="font-size: 0.85rem; color: var(--primary); font-weight: 500;">
                        Forgot Password?
                    </a>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg">
                Login
            </button>

            <div class="auth-divider">
                <span>OR</span>
            </div>

            <!-- ✅ GOOGLE LOGIN BUTTON (FIXED) -->
            <button 
                type="button"
                onclick="window.location.href='http://localhost:5000/api/auth/google'"
                class="btn btn-outline btn-block btn-lg btn-google"
            >
                <img src="assets/google_money_logo.png"
                     alt="Google Money Logo"
                     class="google-logo" style="border-radius: 50%;">
                Continue with Google
            </button>

        </form>

        <div class="auth-footer">
            Don't have an account? <a href="register.html">Register here</a><br><br>
            <a href="admin_landing.html">Admin Login</a>
        </div>

    </div>
</div>

<script src="js/auth.js"></script>

</body>
</html>
