<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset MPIN | Aurex</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <a href="login.html" style="position: absolute; top: 16px; right: 16px; font-size: 1.5rem; color: var(--text-light);"><i class="fas fa-times"></i></a>
            <div class="auth-header">
                <a href="index.html" class="logo" style="display: flex; align-items: center; justify-content: center; text-decoration: none; gap: 8px;">
                    <img src="assets/ajhggc_logo.png" alt="Aurex Logo" class="custom-logo-img" style="height: 48px;">
                    <span class="brand-text" style="font-size: 1.8rem;">Aurex</span>
                </a>
                <h2 id="authTitle">Reset MPIN</h2>
                <p id="authSubtitle" style="color:var(--text-light); margin-top:8px;">Recover your account using security questions.</p>
            </div>

            <div id="forgotError" class="error-message" style="margin-bottom: 20px; text-align:center;"></div>
            <div id="forgotSuccess" class="success-message" style="margin-bottom: 20px; text-align:center;"></div>

            <!-- Step 1: Enter Email -->
            <div id="step1" class="forgot-step">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="forgotEmail" class="form-control" placeholder="Enter your registered email" required>
                </div>
                <button type="button" class="btn btn-primary btn-block btn-lg" onclick="handleFetchQuestions()">Next: Answer Questions</button>
            </div>

            <!-- Step 2: Answer Questions -->
            <div id="step2" class="forgot-step" style="display:none;">
                <div class="form-group">
                    <label class="form-label" id="q1Label">Question 1</label>
                    <input type="text" id="ans1" class="form-control" placeholder="Your Answer" required>
                </div>
                <div class="form-group">
                    <label class="form-label" id="q2Label">Question 2</label>
                    <input type="text" id="ans2" class="form-control" placeholder="Your Answer" required>
                </div>
                <button type="button" class="btn btn-primary btn-block btn-lg" onclick="handleVerifyAnswers()">Next: Create New MPIN</button>
            </div>

            <!-- Step 3: Reset MPIN -->
            <div id="step3" class="forgot-step" style="display:none;">
                <div class="form-group">
                    <label class="form-label">New 6-Digit MPIN</label>
                    <input type="password" id="newMpin" class="form-control" placeholder="Enter new MPIN" required maxlength="6" inputmode="numeric">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm New MPIN</label>
                    <input type="password" id="confirmMpin" class="form-control" placeholder="Confirm new MPIN" required maxlength="6" inputmode="numeric">
                </div>
                <button type="button" class="btn btn-primary btn-block btn-lg" onclick="handleResetMpin()">Reset MPIN</button>
            </div>

            <div class="auth-footer">
                Back to <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
