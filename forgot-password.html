<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | NexusBank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 16px;">
                    <i class="fas fa-university icon-primary"></i>
                    <span>NexusBank</span>
                </a>
                <h2 id="authTitle">Reset Password</h2>
                <p id="authSubtitle" style="color:var(--text-light); margin-top:8px;">Enter your email to set a new password.</p>
            </div>

            <!-- Forgot Password Form -->
            <form id="forgotPasswordForm" onsubmit="handleForgotPassword(event)">
                <div id="forgotError" class="error-message"></div>
                <div id="forgotSuccess" class="success-message"></div>
                
                <div class="form-group">
                    <label class="form-label" style="text-align:left;">Email Address</label>
                    <input type="email" id="forgotEmail" class="form-control" placeholder="Enter your registered email" required>
                </div>

                <div class="form-group" id="newPasswordGroup">
                    <label class="form-label" style="text-align:left;">New Password</label>
                    <input type="password" id="forgotNewPassword" class="form-control" placeholder="Enter new password" required>
                </div>

                <div class="form-group" id="confirmPasswordGroup">
                    <label class="form-label" style="text-align:left;">Confirm Password</label>
                    <input type="password" id="forgotConfirmPassword" class="form-control" placeholder="Confirm new password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" id="forgotSubmitBtn">Reset Password</button>
            </form>

            <div class="auth-footer" id="authFooterText">
                Remember your password? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
