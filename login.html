<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NovaBank</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <span class="logo-mark">N</span>
                    <span class="logo-text">NovaBank</span>
                </div>
                <h2>Welcome back</h2>
                <p>Login using secure OTP verification.</p>
            </div>
            <form action="verify_otp.php" method="POST" class="auth-form">
                <input type="hidden" name="step" value="request_otp">

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Login with OTP</button>
            </form>
            <p class="auth-footer-text">
                New to NovaBank?
                <a href="register.html">Create an account</a>
            </p>
        </div>
    </div>
</body>
</html>
